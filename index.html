<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OMD Finance Platform — Invoice Management">
  <meta name="theme-color" content="#0D0D0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OMD Finance</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='8' fill='%230D0D0F'/><path d='M20 6L33 13.5V28.5L20 36L7 28.5V13.5Z' stroke='%2300D4FF' stroke-width='2' fill='none'/><text x='20' y='24' text-anchor='middle' fill='%2300D4FF' font-family='sans-serif' font-size='10' font-weight='bold'>OMD</text></svg>">
  <link rel="stylesheet" href="css/fury.css">
  <link rel="stylesheet" href="css/invoice-print.css" media="print">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0D0D0F;
      color: #E5E7EB;
      overflow: hidden;
    }

    #app {
      height: 100%;
      width: 100%;
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      background: #0D0D0F;
    }

    .login-card {
      background: #111114;
      border: 1px solid #1F1F23;
      border-radius: 12px;
      padding: 40px 36px;
      width: 380px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .login-logo {
      font-size: 28px;
      font-weight: 700;
      color: #00E5FF;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }

    .login-logo .logo-sub {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: #6B7280;
      letter-spacing: 2px;
      text-align: center;
      margin-top: 4px;
    }

    .login-field {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .login-field label {
      font-size: 12px;
      color: #9CA3AF;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-field input {
      width: 100%;
      padding: 10px 14px;
      background: #1A1A1F;
      border: 1px solid #2A2A30;
      border-radius: 6px;
      color: #E5E7EB;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-field input:focus {
      border-color: #00E5FF;
    }

    .login-field input::placeholder {
      color: #4B5563;
    }

    .login-btn {
      width: 100%;
      padding: 10px 0;
      background: #00E5FF;
      color: #0D0D0F;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .login-btn:hover {
      background: #00D4EC;
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-error {
      color: #EF4444;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    .login-step {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-step.hidden {
      display: none;
    }

    /* ── Main App Layout ── */
    #main-app {
      display: flex;
      height: 100%;
      width: 100%;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 72px;
      min-width: 72px;
      height: 100%;
      background: #111114;
      border-right: 1px solid #1F1F23;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 12px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #00E5FF;
      letter-spacing: 1.5px;
      border: 2px solid #00E5FF;
      border-radius: 8px;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
      flex: 1;
    }

    .nav-item {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 4px;
      text-decoration: none;
      color: #6B7280;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      color: #9CA3AF;
    }

    .nav-item.active {
      color: #00E5FF;
      border-left-color: #00E5FF;
    }

    .nav-item .nav-icon {
      font-size: 20px;
      line-height: 1;
    }

    .nav-item.active .nav-icon {
      color: #00E5FF;
    }

    .nav-item .nav-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      text-align: center;
      line-height: 1.2;
    }

    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding-top: 16px;
      border-top: 1px solid #1F1F23;
      width: 56px;
    }

    .sidebar-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1F1F23;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #9CA3AF;
    }

    .sidebar-user-name {
      font-size: 9px;
      color: #6B7280;
      text-align: center;
      line-height: 1.2;
      word-break: break-all;
      max-width: 60px;
    }

    .sidebar-logout {
      background: none;
      border: none;
      color: #4B5563;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }

    .sidebar-logout:hover {
      color: #EF4444;
    }

    /* ── Content Area ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-width: 0;
    }

    /* ── Top Bar ── */
    #top-bar {
      height: 56px;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid #374151;
      background: #111114;
    }

    #page-title {
      font-size: 18px;
      font-weight: 600;
      color: #E5E7EB;
    }

    .top-bar-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-bar-user-name {
      font-size: 13px;
      color: #9CA3AF;
      font-weight: 500;
    }

    .role-badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-radius: 4px;
    }

    .role-badge.admin {
      background: rgba(0, 229, 255, 0.15);
      color: #00E5FF;
    }

    .role-badge.lead {
      background: rgba(139, 92, 246, 0.15);
      color: #A78BFA;
    }

    .role-badge.viewer {
      background: rgba(107, 114, 128, 0.15);
      color: #9CA3AF;
    }

    /* ── Main Content ── */
    #main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #6B7280;
      font-size: 14px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #2A2A30;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #374151;
    }
  </style>
</head>
<body>

<noscript>
  <div style="background:#0D0D0F;color:#E5E7EB;padding:40px;text-align:center;font-family:sans-serif;">
    <h1>OMD Finance Platform</h1>
    <p>JavaScript is required to use this application.</p>
  </div>
</noscript>

<div id="app">

  <!-- ════════ Login Screen ════════ -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        OMD SYSTEMS
        <span class="logo-sub">Invoice Platform</span>
      </div>

      <div class="login-error" id="login-error"></div>

      <!-- Step 1: Email -->
      <div class="login-step" id="login-step-email">
        <div class="login-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@omdsystems.com" autocomplete="email">
        </div>
        <button class="login-btn" id="btn-send-code" type="button">Send Code</button>
      </div>

      <!-- Step 2: OTP -->
      <div class="login-step hidden" id="login-step-otp">
        <div class="login-field">
          <label for="login-otp">Verification Code</label>
          <input type="text" id="login-otp" placeholder="000000" maxlength="6" autocomplete="one-time-code" inputmode="numeric">
        </div>
        <button class="login-btn" id="btn-verify" type="button">Verify</button>
      </div>
    </div>
  </div>

  <!-- ════════ Main Application ════════ -->
  <div id="main-app" style="display:none">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display:none">
      <div class="spinner"></div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-logo">OMD</div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <a class="nav-item active" href="#/dashboard" data-page="/dashboard">
          <span class="nav-icon">&#x25A3;</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a class="nav-item" href="#/timesheet" data-page="/timesheet">
          <span class="nav-icon">&#x25F7;</span>
          <span class="nav-label">Timesheet</span>
        </a>
        <a class="nav-item" href="#/invoices" data-page="/invoices">
          <span class="nav-icon">&#x25C8;</span>
          <span class="nav-label">Invoices</span>
        </a>
        <a class="nav-item" href="#/employees" data-page="/employees">
          <span class="nav-icon">&#x25CB;</span>
          <span class="nav-label">Employees</span>
        </a>
        <a class="nav-item" href="#/expenses" data-page="/expenses">
          <span class="nav-icon">&#x25B3;</span>
          <span class="nav-label">Expenses</span>
        </a>
        <a class="nav-item" href="#/reports" data-page="/reports">
          <span class="nav-icon">&#x25A0;</span>
          <span class="nav-label">Reports</span>
        </a>
        <a class="nav-item" href="#/settings" data-page="/settings" id="nav-settings">
          <span class="nav-icon">&#x2699;</span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <div class="sidebar-bottom">
        <div class="sidebar-avatar" id="sidebar-avatar"></div>
        <div class="sidebar-user-name" id="sidebar-user-name"></div>
        <button class="sidebar-logout" id="btn-logout" title="Logout">&#x23FB;</button>
      </div>
    </aside>

    <!-- Content -->
    <main id="content">
      <header id="top-bar">
        <span id="page-title">Dashboard</span>
        <div class="top-bar-user">
          <span class="top-bar-user-name" id="top-bar-user-name"></span>
          <span class="role-badge" id="top-bar-role-badge"></span>
        </div>
      </header>

      <div id="main-content">
        <!-- Pages render here -->
      </div>
    </main>

  </div>

</div>

<script src="js/auth.js"></script>
<script src="js/services/timesheet-parser.js"></script>
<script src="js/services/numbering.js"></script>
<script src="js/services/invoice-docx.js"></script>
<script src="js/services/invoice-preview.js"></script>
<script src="js/services/settlements.js"></script>
<script src="js/services/export.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/timesheet.js"></script>
<script src="js/pages/invoices.js"></script>
<script src="js/pages/employees.js"></script>
<script src="js/pages/expenses.js"></script>
<script src="js/pages/reports.js"></script>
<script src="js/pages/settings.js"></script>
<script src="js/app.js"></script>

</body>
</html>
