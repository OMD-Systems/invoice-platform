<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OMD Finance Platform — Invoice Management">
  <meta name="theme-color" content="#0D0D0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- Open Graph -->
  <meta property="og:title" content="OMD Finance">
  <meta property="og:description" content="Invoice & expense management platform for OMD Systems">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <!-- Security -->
  <!-- CSP defined in _headers (Cloudflare Pages); meta tag removed to avoid conflicts -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>OMD Finance</title>
  <!-- Google Fonts (moved from @import in fury.css to non-blocking <link>) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='8' fill='%230D0D0F'/><path d='M20 4L35 12.5V27.5L20 36L5 27.5V12.5Z' stroke='%2300D4FF' stroke-width='1.5' fill='rgba(0,212,255,0.08)'/><path d='M20 10L29 15.2V25.8L20 31L11 25.8V15.2Z' stroke='%2300D4FF' stroke-width='1' fill='none' opacity='0.4'/><text x='20' y='23' text-anchor='middle' fill='%2300D4FF' font-family='Inter,sans-serif' font-size='9' font-weight='700' letter-spacing='1'>OMD</text></svg>">
  <link rel="apple-touch-icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%230D0D0F'/><text x='90' y='110' text-anchor='middle' fill='%2300D4FF' font-family='sans-serif' font-size='48' font-weight='700'>OMD</text></svg>">
  <link rel="stylesheet" href="css/fury.css?v=7">
  <link rel="stylesheet" href="css/invoice-print.css?v=9">
  <style>
    /* ── Reset & Base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0D0D0F;
      color: #E5E7EB;
      overflow: hidden;
    }

    #app {
      height: 100%;
      width: 100%;
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      background: #0D0D0F;
    }

    .login-card {
      background: #111114;
      border: 1px solid #1F1F23;
      border-top: 2px solid #00D4FF;
      border-radius: 12px;
      padding: 40px 36px;
      width: 380px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.06);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
        gap: 16px;
      }
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .login-logo .logo-title {
      font-size: 22px;
      font-weight: 700;
      color: #00D4FF;
      letter-spacing: 4px;
    }

    .login-logo .logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: #6B7280;
      letter-spacing: 2px;
      text-align: center;
    }

    .login-field {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .login-field label {
      font-size: 12px;
      color: #9CA3AF;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-field input {
      width: 100%;
      padding: 10px 14px;
      background: #1A1A1F;
      border: 1px solid #2A2A30;
      border-radius: 6px;
      color: #E5E7EB;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-field input:focus {
      border-color: #00D4FF;
    }

    .login-field input::placeholder {
      color: #4B5563;
    }

    .login-btn {
      width: 100%;
      padding: 10px 0;
      background: #00D4FF;
      color: #0D0D0F;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .login-btn:hover {
      background: #00D4EC;
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-error {
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    .login-error.error {
      color: #EF4444;
    }

    .login-error.success {
      color: #10B981;
    }

    .login-error.info {
      color: #6B7280;
    }

    .login-step {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-step.hidden {
      display: none;
    }

    .login-remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #9CA3AF;
      user-select: none;
    }

    .login-remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #00D4FF;
      cursor: pointer;
      margin: 0;
    }

    .login-remember span {
      line-height: 1;
    }

    /* ── Main App Layout ── */
    #main-app {
      display: flex;
      height: 100%;
      width: 100%;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 72px;
      min-width: 72px;
      height: 100%;
      background: #111114;
      border-right: 1px solid #1F1F23;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 12px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
      flex: 1;
    }

    .nav-item {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 4px;
      text-decoration: none;
      color: #6B7280;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      color: #9CA3AF;
    }

    .nav-item.active {
      color: #00D4FF;
      border-left-color: #00D4FF;
    }

    .nav-item .nav-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
    }

    .nav-item .nav-icon svg {
      width: 20px;
      height: 20px;
    }

    .nav-item .nav-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      text-align: center;
      line-height: 1.2;
    }

    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding-top: 16px;
      border-top: 1px solid #1F1F23;
      width: 56px;
    }

    .sidebar-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1F1F23;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #9CA3AF;
    }

    .sidebar-user-name {
      font-size: 9px;
      color: #6B7280;
      text-align: center;
      line-height: 1.2;
      word-break: break-all;
      max-width: 60px;
    }

    .sidebar-logout {
      background: none;
      border: none;
      color: #4B5563;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }

    .sidebar-logout:hover {
      color: #EF4444;
    }

    /* ── Content Area ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-width: 0;
    }

    @media (max-width: 768px) {
      #main-app {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: 64px;
        min-height: 64px;
        flex-direction: row;
        border-right: none;
        border-top: 1px solid #1F1F23;
        padding: 0 16px;
        order: 2;
        /* Move to bottom */
        overflow: hidden;
        justify-content: space-between;
      }

      .sidebar-logo {
        display: none;
        /* Hide logo on mobile bottom nav */
      }

      .sidebar-nav {
        flex-direction: row;
        justify-content: space-around;
        height: 100%;
        gap: 0;
      }

      .nav-item {
        width: auto;
        padding: 4px 12px;
        border-left: none;
        border-top: 3px solid transparent;
        /* Highlight on top for bottom nav */
        justify-content: center;
      }

      .nav-item.active {
        border-left-color: transparent;
        border-top-color: #00D4FF;
      }

      .sidebar-bottom {
        display: none;
        /* Hide user profile in bottom nav, rely on top bar */
      }

      #content {
        order: 1;
        /* Content above nav */
        min-height: 0;
        /* Important for flex child scrolling */
      }
    }

    /* ── Top Bar ── */
    #top-bar {
      height: 56px;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid #374151;
      background: #111114;
    }

    .fury-tabs {
      display: flex;
      border-bottom: 1px solid var(--fury-border);
      gap: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }

    #page-title {
      font-size: 18px;
      font-weight: 600;
      color: #E5E7EB;
    }

    .top-bar-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-bar-user-name {
      font-size: 13px;
      color: #9CA3AF;
      font-weight: 500;
    }

    .role-badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-radius: 4px;
    }

    .role-badge.admin {
      background: rgba(0, 229, 255, 0.15);
      color: #00D4FF;
    }

    .role-badge.lead {
      background: rgba(139, 92, 246, 0.15);
      color: #A78BFA;
    }

    .role-badge.viewer {
      background: rgba(107, 114, 128, 0.15);
      color: #9CA3AF;
    }

    /* ── Main Content ── */
    #main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #6B7280;
      font-size: 14px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #2A2A30;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #374151;
    }

    /* ── Skip Navigation ── */
    .skip-nav {
      position: absolute;
      top: -100%;
      left: 16px;
      z-index: 9999;
      padding: 8px 16px;
      background: #00D4FF;
      color: #0D0D0F;
      font-weight: 600;
      font-size: 14px;
      border-radius: 0 0 6px 6px;
      text-decoration: none;
      transition: top 0.2s;
    }
    .skip-nav:focus {
      top: 0;
    }

    /* ── Global Focus Visible ── */
    .nav-item:focus-visible {
      outline: 2px solid #00D4FF;
      outline-offset: -2px;
    }

    .login-btn:focus-visible {
      outline: 2px solid #00D4FF;
      outline-offset: 2px;
    }

    .login-field input:focus-visible {
      border-color: #00D4FF;
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
    }

    .sidebar-logout:focus-visible {
      outline: 2px solid #00D4FF;
      outline-offset: 2px;
    }

    /* ── Session Expiry Modal ── */
    #session-expiry-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    .session-expiry-card {
      background: #111114;
      border: 1px solid #1F1F23;
      border-top: 2px solid #F59E0B;
      border-radius: 12px;
      padding: 32px;
      width: 380px;
      max-width: 90vw;
      text-align: center;
      box-shadow: 0 0 60px rgba(245, 158, 11, 0.12);
    }

    .session-expiry-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: rgba(245, 158, 11, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #F59E0B;
      font-size: 24px;
    }

    .session-expiry-title {
      font-size: 16px;
      font-weight: 600;
      color: #E5E7EB;
      margin-bottom: 8px;
    }

    .session-expiry-msg {
      font-size: 13px;
      color: #9CA3AF;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .session-expiry-timer {
      font-size: 28px;
      font-weight: 700;
      color: #F59E0B;
      font-variant-numeric: tabular-nums;
      margin-bottom: 24px;
    }

    .session-expiry-timer.critical {
      color: #EF4444;
      animation: pulse-critical 1s ease-in-out infinite;
    }

    @keyframes pulse-critical {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .session-expiry-actions {
      display: flex;
      gap: 12px;
    }

    .session-expiry-actions button {
      flex: 1;
      padding: 10px 0;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }

    .session-expiry-actions button:hover {
      opacity: 0.85;
    }

    .session-expiry-actions button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-extend-session {
      background: #00D4FF;
      color: #0D0D0F;
    }

    .btn-session-logout {
      background: #1F1F23;
      color: #9CA3AF;
      border: 1px solid #2A2A30 !important;
    }
  </style>
</head>

<body>

  <a href="#main-content" class="skip-nav">Skip to main content</a>
  <div class="fury-toast-container" id="toast-container" aria-live="polite" role="status"></div>

  <noscript>
    <div style="background:#0D0D0F;color:#E5E7EB;padding:40px;text-align:center;font-family:sans-serif;">
      <h1>OMD Finance Platform</h1>
      <p>JavaScript is required to use this application.</p>
    </div>
  </noscript>

  <div id="app">

    <!-- ════════ Login Screen ════════ -->
    <div id="login-screen">
      <div class="login-card" role="form" aria-label="Login form">
        <div class="login-logo">
          <svg width="56" height="56" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M20 4L35 12.5V27.5L20 36L5 27.5V12.5Z" stroke="#00D4FF" stroke-width="1.5"
              fill="rgba(0,212,255,0.06)" />
            <path d="M20 10L29 15.2V25.8L20 31L11 25.8V15.2Z" stroke="#00D4FF" stroke-width="0.8" fill="none"
              opacity="0.3" />
            <text x="20" y="23" text-anchor="middle" fill="#00D4FF" font-family="Inter,sans-serif" font-size="9"
              font-weight="700" letter-spacing="1">OMD</text>
          </svg>
          <span class="logo-title">OMD SYSTEMS</span>
          <span class="logo-sub">Finance Platform</span>
        </div>

        <div class="login-error" id="login-error" role="alert" aria-live="assertive"></div>

        <!-- Step 1: Email -->
        <div class="login-step" id="login-step-email">
          <div class="login-field">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@omdsystems.com" autocomplete="email">
          </div>
          <label class="login-remember" for="login-remember">
            <input type="checkbox" id="login-remember">
            <span>Remember me</span>
          </label>
          <button class="login-btn" id="btn-send-code" type="button">Send Code</button>
        </div>

        <!-- Step 2: OTP -->
        <div class="login-step hidden" id="login-step-otp">
          <div class="login-field">
            <label for="login-otp">Verification Code</label>
            <input type="text" id="login-otp" placeholder="000000" maxlength="8" autocomplete="one-time-code"
              inputmode="numeric">
          </div>
          <button class="login-btn" id="btn-verify" type="button">Verify</button>
        </div>
      </div>
    </div>

    <!-- ════════ Main Application ════════ -->
    <div id="main-app" style="display:none">

      <!-- Loading Overlay -->
      <div id="loading-overlay" class="loading-overlay" style="display:none" role="status" aria-live="polite" aria-label="Loading">
        <div class="spinner"></div>
      </div>

      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-logo" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4L35 12.5V27.5L20 36L5 27.5V12.5Z" stroke="#00D4FF" stroke-width="1.5"
              fill="rgba(0,212,255,0.06)" />
            <path d="M20 10L29 15.2V25.8L20 31L11 25.8V15.2Z" stroke="#00D4FF" stroke-width="0.8" fill="none"
              opacity="0.3" />
            <text x="20" y="23" text-anchor="middle" fill="#00D4FF" font-family="Inter,sans-serif" font-size="9"
              font-weight="700" letter-spacing="1">OMD</text>
          </svg>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main navigation">
          <a class="nav-item" href="#/dashboard" data-page="/dashboard" id="nav-dashboard" style="display:none">
            <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
              </svg></span>
            <span class="nav-label">Dashboard</span>
          </a>
          <a class="nav-item active" href="#/team" data-page="/team" id="nav-team">
            <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
              </svg></span>
            <span class="nav-label">Team</span>
          </a>
          <a class="nav-item" href="#/invoices" data-page="/invoices">
            <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="9" y1="13" x2="15" y2="13" />
                <line x1="9" y1="17" x2="13" y2="17" />
              </svg></span>
            <span class="nav-label">Invoices</span>
          </a>
          <a class="nav-item" href="#/expenses" data-page="/expenses" id="nav-expenses">
            <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="1" x2="12" y2="23" />
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
              </svg></span>
            <span class="nav-label">Expenses</span>
          </a>
          <a class="nav-item" href="#/settings" data-page="/settings" id="nav-settings">
            <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
